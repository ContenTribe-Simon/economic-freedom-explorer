name: Test gate

# Runs the project's automated test gates on PRs to main (and on pushes to main).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The -p flag matters: plain `tsc --noEmit` against the references-only root
      # tsconfig.json type-checks ZERO files and always exits 0 (Phase 12 workstream A
      # finding, product-vision.md §6). This is also what Lovable's publish pipeline
      # enforces, so a red step here means the app cannot be published.
      - name: Typecheck (tsc)
        run: npx tsc -p tsconfig.app.json --noEmit

      - name: Unit tests (Vitest)
        run: npm test

      - name: Build
        run: npm run build

      # Installs Chromium (+ OS deps) and runs the Playwright suite. See e2e/README.md.
      - name: E2E tests (Playwright)
        run: npm run test:e2e:ci
