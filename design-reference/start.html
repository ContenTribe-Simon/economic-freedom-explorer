<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frihedsmodel — kom i gang</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link rel="stylesheet" href="_ds/frihedsmodel-design-system-25764f12-5bfe-4a09-abca-39baa41d686e/styles.css">
<script src="_ds/frihedsmodel-design-system-25764f12-5bfe-4a09-abca-39baa41d686e/_ds_bundle.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg-page, #F4F6F2); color: var(--ink, #17302B); font-family: var(--font-body); -webkit-font-smoothing: antialiased; }

  .page { position: relative; min-height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  .top { position: relative; z-index: 2; display: flex; align-items: center; justify-content: space-between; padding: 26px clamp(18px,5vw,40px) 0; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .mark { width: 14px; height: 14px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, var(--dawn-glow), var(--dawn)); box-shadow: 0 0 0 4px var(--dawn-soft); }
  .wordmark { font-family: var(--font-display); font-weight: 500; font-size: 21px; letter-spacing: -0.01em; color: var(--ink); }

  .center { position: relative; z-index: 2; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: clamp(40px,8vh,96px) clamp(18px,5vw,40px) clamp(48px,9vh,110px); }
  .stack { max-width: 660px; width: 100%; }

  .eyebrow { font-size: 12.5px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-faint); margin: 0 0 22px; }
  h1 { font-family: var(--font-display); font-weight: 300; font-size: clamp(34px,6.4vw,60px); line-height: 1.06; letter-spacing: -0.018em; color: var(--ink); margin: 0; }
  .lede { font-size: clamp(17px,2.4vw,20px); color: var(--ink-soft); line-height: 1.6; margin: 24px auto 0; max-width: 33em; }

  .points { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; margin: clamp(36px,5vw,52px) 0 0; text-align: left; }
  .point { display: flex; flex-direction: column; gap: 9px; }
  .picon { display: inline-flex; align-items: center; justify-content: center; width: 38px; height: 38px; border-radius: 50%; background: var(--fjord-soft); color: var(--fjord); flex: none; }
  .ptitle { font-family: var(--font-body); font-size: 15px; font-weight: 600; color: var(--ink); margin: 0; }
  .phelp { font-family: var(--font-body); font-size: 13.5px; color: var(--ink-soft); line-height: 1.5; margin: 0; }

  .cta { margin: clamp(36px,5vw,52px) 0 0; display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .cta-note { font-size: 13.5px; color: var(--ink-faint); }

  .motif { position: absolute; left: 0; right: 0; bottom: 0; width: 100%; height: clamp(180px,32vh,300px); z-index: 1; pointer-events: none; }

  .rise { opacity: 1; }
  @media (prefers-reduced-motion: no-preference) {
    .rise { opacity: 0; transform: translateY(12px); animation: rise 0.9s cubic-bezier(0.22,0.61,0.36,1) forwards; }
    @keyframes rise { to { opacity: 1; transform: translateY(0); } }
    .motif path.motif-line { stroke-dasharray: 1400; stroke-dashoffset: 1400; animation: draw 1.6s cubic-bezier(0.33,0.66,0.4,1) 0.2s forwards; }
    .motif .motif-fill-path { opacity: 0; animation: motifFill 0.7s ease 1.2s forwards; }
    .motif .motif-glow { opacity: 0; transform-box: fill-box; transform-origin: center; transform: scale(0.4); animation: glowIn 0.6s cubic-bezier(0.22,0.61,0.36,1) 1.0s both, glowBreathe 4.6s ease-in-out 1.7s infinite; }
    .motif .motif-dot { opacity: 0; transform-box: fill-box; transform-origin: center; transform: scale(0.4); animation: dotIn 0.5s cubic-bezier(0.22,0.61,0.36,1) 1.0s both; }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    @keyframes motifFill { to { opacity: 1; } }
    @keyframes glowIn { from { opacity: 0; transform: scale(0.4); } to { opacity: 1; transform: scale(1); } }
    @keyframes dotIn { from { opacity: 0; transform: scale(0.4); } to { opacity: 0.7; transform: scale(1); } }
    @keyframes glowBreathe { 0%, 100% { opacity: 0.88; transform: scale(1); } 50% { opacity: 1; transform: scale(1.07); } }
  }
  @media (max-width: 600px) {
    .points { grid-template-columns: 1fr; gap: 20px; max-width: 22em; margin-left: auto; margin-right: auto; }
  }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    function mount() {
      const NS = window.FrihedsmodelDesignSystem_25764f;
      if (!NS || !NS.Button) { return setTimeout(mount, 60); }
      const { Button, Icon } = NS;

      const POINTS = [
        { icon: "wallet", title: "Dine egne tal", help: "Bygget på de tal, du selv taster ind." },
        { icon: "compass", title: "Et klart svar", help: "Du får svaret i ét blik, ikke en rapport." },
        { icon: "shield", title: "Ikke rådgivning", help: "Et kvalificeret billede, ikke økonomisk rådgivning." },
      ];

      // Decorative horizon motif — faint single curve with a small sunrise marker.
      function Motif() {
        const W = 1200, H = 300, base = 250;
        const d = `M0,${base} C150,${base - 30} 280,${base - 120} 460,${base - 150} `
          + `C620,${base - 176} 760,${base - 150} 900,${base - 96} `
          + `C1030,${base - 46} 1110,${base - 18} 1200,${base - 8}`;
        const fx = 560, fy = base - 173;
        return (
          <svg className="motif" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYEnd slice" aria-hidden="true" focusable="false">
            <defs>
              <linearGradient id="motif-fill" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0" stopColor="var(--fjord)" stopOpacity="0.07" />
                <stop offset="1" stopColor="var(--fjord)" stopOpacity="0" />
              </linearGradient>
              <radialGradient id="motif-glow" cx="50%" cy="50%" r="50%">
                <stop offset="0" stopColor="var(--dawn)" stopOpacity="0.32" />
                <stop offset="1" stopColor="var(--dawn)" stopOpacity="0" />
              </radialGradient>
            </defs>
            <path className="motif-fill-path" d={`${d} L${W},${H} L0,${H} Z`} fill="url(#motif-fill)" />
            <path className="motif-line" d={d} fill="none" stroke="var(--fjord)" strokeOpacity="0.28" strokeWidth="2" strokeLinecap="round" />
            <circle className="motif-glow" cx={fx} cy={fy} r="26" fill="url(#motif-glow)" />
            <circle className="motif-dot" cx={fx} cy={fy} r="5.5" fill="var(--dawn)" opacity="0.7" />
          </svg>
        );
      }

      function App() {
        return (
          <div className="page">
            <Motif />
            <header className="top">
              <div className="brand"><span className="mark"></span><span className="wordmark">Frihedsmodel</span></div>
            </header>

            <main className="center">
              <div className="stack">
                <p className="eyebrow rise">Frihedsmodel</p>
                <h1 className="rise" style={{ animationDelay: "0.04s" }}>Se hvornår du kan stoppe med at arbejde.</h1>
                <p className="lede rise" style={{ animationDelay: "0.1s" }}>Svar på nogle få spørgsmål om din økonomi, så viser vi dig, hvornår dine penge kan bære dig resten af livet. Det tager et par minutter, og du kan altid justere undervejs.</p>

                <div className="points rise" style={{ animationDelay: "0.16s" }}>
                  {POINTS.map((p) => (
                    <div className="point" key={p.title}>
                      <span className="picon"><Icon name={p.icon} size={19} /></span>
                      <h2 className="ptitle">{p.title}</h2>
                      <p className="phelp">{p.help}</p>
                    </div>
                  ))}
                </div>

                <div className="cta rise" style={{ animationDelay: "0.22s" }}>
                  <Button variant="primary" size="lg" href="simple-inputs.html" iconRight={<Icon name="arrow-right" size={18} />}>Kom i gang</Button>
                  <span className="cta-note">Gratis og uforpligtende. Du taster selv dine tal ind.</span>
                </div>
              </div>
            </main>
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    }
    mount();
  </script>
</body>
</html>
